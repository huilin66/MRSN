_base_: 'C2Seg_BW.yml'

model:
  type: CX_Uper_4B2H_CA_FLASH
  backb: convnext_tiny
  in_channels: 3
  num_classes: 14
  dropout_rate: 0
  hsi_chs: 116


loss:
  types:
    - type: MixedLoss
      losses:
        - type: OhemCrossEntropyLoss_Smooth
          smoothing: 0.05
        - type: DiceLoss
      coef: [1, 0.5]
  coef: [1]